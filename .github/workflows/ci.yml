name: CI

# Builds the JUCE adapter (pulp_embed_juce) + the VST3/AU/Standalone plugin
# example against an installed Pulp SDK and the pulp-view-embed checkout, on a
# macOS runner.
#
# This repo needs THREE inputs:
#   1. An installed Pulp SDK (find_package(Pulp) transitively, via pulp-view-embed)
#      — acquired from an actions/cache keyed on PULP_SDK_VERSION, else from
#      PULP_SDK_TARBALL_URL (sha256-verified), else fail with a clear message.
#   2. The pulp-view-embed checkout (-DPULP_VIEW_EMBED_DIR) — cloned from
#      vars.PULP_VIEW_EMBED_REPO @ vars.PULP_VIEW_EMBED_REF (defaults to the
#      canonical repo @ main).
#   3. JUCE — pulled by FetchContent (pinned tag in CMakeLists.txt) and cached.
#
# GPU reality: GitHub-hosted macOS runners have no Metal/window server. The
# embed's GPU asserts live in pulp-view-embed's own smoke (run in ITS CI); here
# we build the plugin formats + run the Standalone headless self-check, which
# degrades to a deterministic Skia render when no GPU is present. The full GPU
# lane runs in a Pulp Tart VM (Metal headless) — see the trailing comment.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-15
    env:
      PULP_SDK_VERSION: ${{ vars.PULP_SDK_VERSION }}
      PULP_SDK_TARBALL_URL: ${{ vars.PULP_SDK_TARBALL_URL }}
      PULP_SDK_TARBALL_SHA256: ${{ vars.PULP_SDK_TARBALL_SHA256 }}
      PULP_VIEW_EMBED_REPO: ${{ vars.PULP_VIEW_EMBED_REPO || 'https://github.com/danielraffel/pulp-view-embed.git' }}
      PULP_VIEW_EMBED_REF: ${{ vars.PULP_VIEW_EMBED_REF || 'main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve paths
        id: paths
        run: |
          echo "prefix=${RUNNER_TEMP}/pulp-sdk" >> "$GITHUB_OUTPUT"
          echo "embed=${RUNNER_TEMP}/pulp-view-embed" >> "$GITHUB_OUTPUT"

      - name: Restore Pulp SDK cache
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.prefix }}
          key: pulp-sdk-${{ runner.os }}-${{ runner.arch }}-${{ env.PULP_SDK_VERSION || 'unset' }}

      - name: Acquire Pulp SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          PREFIX="${{ steps.paths.outputs.prefix }}"
          if [ -z "${PULP_SDK_TARBALL_URL:-}" ]; then
            echo "::error::No cached Pulp SDK and no PULP_SDK_TARBALL_URL set."
            echo "::error::Publish a relocatable SDK tarball with pulp-view-embed's tools/package-sdk.sh,"
            echo "::error::then set repo variables PULP_SDK_VERSION, PULP_SDK_TARBALL_URL, PULP_SDK_TARBALL_SHA256."
            exit 1
          fi
          echo "Downloading SDK from ${PULP_SDK_TARBALL_URL}"
          curl -fSL "${PULP_SDK_TARBALL_URL}" -o "${RUNNER_TEMP}/pulp-sdk.tar.gz"
          if [ -n "${PULP_SDK_TARBALL_SHA256:-}" ]; then
            echo "${PULP_SDK_TARBALL_SHA256}  ${RUNNER_TEMP}/pulp-sdk.tar.gz" | shasum -a 256 -c -
          else
            echo "::warning::PULP_SDK_TARBALL_SHA256 not set — skipping checksum verification."
          fi
          mkdir -p "${PREFIX}"
          tar xzf "${RUNNER_TEMP}/pulp-sdk.tar.gz" -C "${RUNNER_TEMP}"
          inner="$(find "${RUNNER_TEMP}" -maxdepth 1 -type d -name 'pulp-sdk-*' | head -1)"
          if [ -n "${inner}" ]; then cp -a "${inner}/." "${PREFIX}/"; fi
          test -f "${PREFIX}/lib/cmake/Pulp/PulpConfig.cmake" \
            || { echo "::error::Unpacked SDK has no lib/cmake/Pulp/PulpConfig.cmake"; exit 1; }

      - name: Verify SDK present
        run: |
          PREFIX="${{ steps.paths.outputs.prefix }}"
          test -f "${PREFIX}/lib/cmake/Pulp/PulpConfig.cmake" \
            || { echo "::error::Pulp SDK not available at ${PREFIX} (cache miss + no tarball)."; exit 1; }

      - name: Checkout pulp-view-embed
        run: |
          git clone --depth 1 --branch "${PULP_VIEW_EMBED_REF}" \
            "${PULP_VIEW_EMBED_REPO}" "${{ steps.paths.outputs.embed }}"

      - name: Cache FetchContent (JUCE)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ steps.paths.outputs.prefix }}" \
            -DPULP_VIEW_EMBED_DIR="${{ steps.paths.outputs.embed }}" \
            -DPULP_EMBED_JUCE_BUILD_EXAMPLE=ON

      - name: Build adapter + plugin (VST3/AU/Standalone)
        run: cmake --build build --target PulpEmbedJucePlugin_All -j"$(sysctl -n hw.ncpu)"

      - name: Headless editor self-check (Standalone)
        run: |
          set -euo pipefail
          APP="build/PulpEmbedJucePlugin_artefacts/Release/Standalone/PulpEmbedJuce.app/Contents/MacOS/PulpEmbedJuce"
          if [ -x "$APP" ]; then
            # The self-check degrades to a deterministic Skia render when no GPU
            # is present (hosted runner). It is a soft signal here; the real GPU
            # capture runs in the Tart lane.
            PULP_EMBED_SELFCHECK=1 "$APP" || echo "::warning::Standalone self-check returned non-zero (expected on a GPU-less hosted runner)"
          else
            echo "::warning::Standalone app not found at $APP — skipping self-check"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juce-embed-macos
          path: |
            /tmp/juce-plugin-*.png
          if-no-files-found: ignore

# ── Running the full GPU lane in a Tart VM ───────────────────────────────────
# Hosted runners prove the build + dependency recipe. To exercise the real GPU
# editor render + live capture, run the SAME configure/build/self-check inside a
# Pulp Tart golden VM (Apple Virtualization exposes Metal headless). See Pulp's
# tart-ci skill and docs/guides/local-ci.md; tools/ci/tart-run-job.sh runs the
# command against the baked SDK with no GPU-disable env.
